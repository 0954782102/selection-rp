<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Увійти | Selection RP</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="auth-page container py-5">
    <div class="card mx-auto auth-card">
      <div class="card-body">
        <h2 class="card-title text-center">Авторизація</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="nickname">Нікнейм</label>
            <input id="nickname" name="nickname" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="password">Пароль</label>
            <input id="password" name="password" type="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Увійти</button>
          <div class="alert alert-info mt-3">Тестовий користувач: <strong>demo</strong> / <strong>demo123</strong></div>
        </form>
        <div id="login-message" class="mt-3"></div>
        <div class="text-center mt-3">
          <a href="index.html">Назад на головну</a>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/app.js"></script>
</body>
</html>
